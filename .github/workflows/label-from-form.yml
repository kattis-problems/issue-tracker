name: Label from issue form
on:
  issues:
    types: [opened]
permissions:
  issues: write
jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const allowed = new Set([
              'weak data', 'incorrect data', 'incorrect bounds', 'time limit',
              'clarity', 'statement', 'metadata', 'weak solutions',
              'weak input validator', 'output validator crash',
              'completely broken', 'other',
            ]);
            const body = context.payload.issue.body ?? '';
            const m = body.match(/### Labels\s+([\s\S]*?)(?:\n###|$)/);
            if (!m) return;
            const labels = m[1].split(',').map(s => s.trim()).filter(s => allowed.has(s));
            if (labels.length) {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.payload.issue.number,
                labels,
              });
            }